name: Build & Deploy

# Builds the gateway image on GitHub's runners (16 GB RAM — enough to compile
# RocksDB from source, unlike Render's builders) and pushes it to GHCR. Render
# is configured (render.yaml) to PULL this prebuilt image, so deploys never
# compile anything. Optionally pings a Render deploy hook to roll it out.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "shared/**"
      - "apps/web/**"
      - "assets/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cypher-asi/wilder-gibson
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse Docker layer cache across runs so unchanged layers are skipped.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering Render deploy..."
            curl -fsSL -X POST "$HOOK" > /dev/null
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set; skipping auto-deploy."
            echo "Add it under repo Settings > Secrets and variables > Actions."
          fi
