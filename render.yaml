# Render Blueprint for Wilder.
#
# One stateful web service: the gateway serves HTTP + WebSocket + game assets
# AND the built web client, all on one origin (the client uses relative /ws,
# /api and /assets URLs, so same-origin is required).
#
# The world sim lives in-process and persists to embedded RocksDB on the
# attached disk, so this service scales VERTICALLY only. Do not raise
# numInstances above 1 — a second replica would run its own separate world.
#
# The service lives in the "wilder world" project. Resources are defined under
# projects/environments and must NOT be duplicated at the top level.
projects:
  - name: wilder world
    environments:
      - name: production
        services:
          - type: web
            name: wilder-gibson
            # Deploy a PREBUILT image, not a Dockerfile. RocksDB compiles from
            # C++ source and exhausts Render's build machines, so all the heavy
            # lifting happens locally (see tools/deploy/build-and-push.ps1) and
            # Render only pulls + boots the finished image.
            runtime: image
            image:
              url: ghcr.io/cypher-asi/wilder-gibson:latest
            # Real-time 20 Hz sim wants a dedicated core. `standard` (1 CPU) is
            # the minimum; `pro` (2 CPU / 4 GB) is the recommended launch size.
            # Bump to `pro plus` / `pro max` as players and agents grow.
            plan: pro
            numInstances: 1
            healthCheckPath: /api/health
            disk:
              name: wilder-data
              mountPath: /data
              sizeGB: 50
            envVars:
              # RocksDB world/account data — must live on the persistent disk.
              - key: WILDER_DATA
                value: /data/world
              # Never expose the dev quick-login endpoint in production.
              - key: WILDER_DEV
                value: "0"
              - key: RUST_LOG
                value: info,wilder=info
